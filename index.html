<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Dex • 1025 Pokémon</title>
  <style>
    :root { --bg: #f0f0f0; --text: #222; --card: #fff; }
    [data-theme="dark"] { --bg: #1a1a1a; --text: #eee; --card: #2a2a2a; }
    body { margin:0; padding:20px; background:var(--bg); color:var(--text); font-family:system-ui; }
    header { display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:20px; }
    button, select { padding:10px 16px; font-size:1rem; border-radius:8px; cursor:pointer; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px; }
    .pokemon-card {
      background:var(--card); border-radius:16px; padding:12px; text-align:center;
      box-shadow:0 4px 15px rgba(0,0,0,0.1); transition:all 0.3s ease; cursor:pointer;
    }
    .pokemon-card:hover { transform:scale(1.08); box-shadow:0 10px 25px rgba(0,0,0,0.2); }
    .pokemon-card.caught { opacity:0.65; filter:grayscale(1); }
    .pokemon-card img { width:110px; height:110px; image-rendering:pixelated; transition:transform 0.4s; }
    .pokemon-card.caught img { animation:catchPop 0.6s ease; }
    @keyframes catchPop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
    .loading {
      position:fixed; top:0; left:0; width:100%; height:100%; background:#000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:9999; color:white; font-size:2rem;
    }
    .pokeball {
      width:120px; height:120px; background:radial-gradient(circle,#fff 50%,#ff0000 50%);
      border:12px solid #222; border-radius:50%; position:relative; animation:spin 1s linear infinite;
    }
    .pokeball::after {
      content:""; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:30px; height:30px; background:#222; border:4px solid #fff; border-radius:50%;
    }
    .progress-bar { height:20px; background:#333; border-radius:9999px; overflow:hidden; margin:8px 0; }
    .progress-bar-fill { height:100%; background:#ffcb05; width:0%; transition:width 0.8s ease; }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85);
      display:none; align-items:center; justify-content:center; z-index:10000; }
    .modal-content { background:var(--card); padding:25px; border-radius:20px; max-width:420px; width:90%; text-align:center; }
    .type-badge { display:inline-block; padding:4px 12px; margin:4px; border-radius:9999px; color:white; font-weight:bold; font-size:0.9rem; }
    .gen-progress { display:flex; flex-wrap:wrap; gap:15px; margin-top:15px; }
    .gen-card { background:var(--card); border-radius:12px; padding:12px; width:100%; max-width:280px; }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading" class="loading">
    <div class="pokeball" id="pokeball"></div>
    <p id="loading-text" style="margin-top:30px">Catching them all...</p>
  </div>

  <header>
    <h1 style="margin:0">🟥 Living Dex</h1>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button id="theme-btn">🌙 Dark</button>
      <button id="shiny-btn">✨ Shiny OFF</button>
      <select id="sort-select">
        <option value="number">Sort by #</option>
        <option value="name">Sort by Name</option>
        <option value="uncaught">Uncaught First</option>
      </select>
      <button id="random-btn">🎲 Random Uncaught</button>
      <button id="reset-btn">Reset Dex</button>
    </div>
  </header>

  <div style="margin:15px 0;">
    <strong>Total Caught: <span id="caught-count">0</span>/1025</strong>
    <div class="progress-bar"><div id="total-progress" class="progress-bar-fill"></div></div>
  </div>

  <div class="gen-progress" id="gen-progress"></div>

  <main id="grid" class="grid"></main>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <h2 id="modal-name"></h2>
      <img id="modal-sprite" style="width:200px;" alt="">
      <div id="modal-types" style="margin:15px 0;"></div>
      <div id="modal-evo" style="text-align:left; margin:20px 0; background:rgba(0,0,0,0.05); padding:15px; border-radius:12px;"></div>
      <button id="close-modal" style="padding:12px 30px;">Close</button>
    </div>
  </div>

  <script>
    let allPokemon = [];
    let caught = new Set(JSON.parse(localStorage.getItem("caught")) || []);
    let shinyMode = false;

    const typeColors = {
      normal: "#A8A878", fire: "#F08030", water: "#6890F0", grass: "#78C850",
      electric: "#F8D030", ice: "#98D8D8", fighting: "#C03028", poison: "#A040A0",
      ground: "#E0C068", flying: "#A890F0", psychic: "#F85888", bug: "#A8B820",
      rock: "#B8A038", ghost: "#705898", dragon: "#7038F8", dark: "#705848",
      steel: "#B8B8D0", fairy: "#EE99AC"
    };

    const genRanges = [
      {gen:1, start:1, end:151}, {gen:2, start:152, end:251},
      {gen:3, start:252, end:386}, {gen:4, start:387, end:493},
      {gen:5, start:494, end:649}, {gen:6, start:650, end:721},
      {gen:7, start:722, end:809}, {gen:8, start:810, end:905},
      {gen:9, start:906, end:1025}
    ];

    const loading = document.getElementById("loading");
    const grid = document.getElementById("grid");

    // Upgraded loading animation
    window.addEventListener("load", () => {
      const pokeball = document.getElementById("pokeball");
      const text = document.getElementById("loading-text");
      setTimeout(() => {
        pokeball.style.animation = "shake 0.5s 4";
        text.textContent = "Gotcha!";
        setTimeout(() => {
          loading.style.opacity = "0";
          setTimeout(() => loading.remove(), 800);
          fetchPokemon();
        }, 1800);
      }, 3200);
    });

    async function fetchPokemon() {
      const res = await fetch("https://pokeapi.co/api/v2/pokemon?limit=1025");
      const data = await res.json();
      allPokemon = data.results.map((p, i) => ({
        id: i + 1,
        name: p.name.charAt(0).toUpperCase() + p.name.slice(1),
        sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${i+1}.png`,
        shiny: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${i+1}.png`
      }));
      renderGrid();
      renderGenProgress();
    }

    function getSprite(p) { return shinyMode ? p.shiny : p.sprite; }

    function getGen(id) {
      return genRanges.find(g => id >= g.start && id <= g.end).gen;
    }

    function renderGrid() {
      grid.innerHTML = "";
      let sorted = [...allPokemon];
      const sortType = document.getElementById("sort-select").value;

      if (sortType === "name") sorted.sort((a,b) => a.name.localeCompare(b.name));
      else if (sortType === "uncaught") {
        sorted.sort((a,b) => {
          const aC = caught.has(a.id), bC = caught.has(b.id);
          return aC === bC ? a.id - b.id : aC ? 1 : -1;
        });
      }

      sorted.forEach(p => {
        const isCaught = caught.has(p.id);
        const card = document.createElement("div");
        card.className = `pokemon-card ${isCaught ? "caught" : ""}`;
        card.innerHTML = `
          <img src="${getSprite(p)}" alt="${p.name}">
          <strong>#${p.id.toString().padStart(4,"0")}</strong><br>
          <span>${p.name}</span>
        `;
        card.addEventListener("click", () => showDetail(p));
        grid.appendChild(card);
      });
      updateTotalProgress();
    }

    async function showDetail(p) {
      const modal = document.getElementById("modal");
      document.getElementById("modal-name").textContent = `#${p.id} ${p.name}`;
      document.getElementById("modal-sprite").src = getSprite(p);

      // Fetch full details
      const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${p.id}`);
      const data = await res.json();
      const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${p.id}`);
      const species = await speciesRes.json();

      // Types
      let typesHTML = "";
      data.types.forEach(t => {
        const color = typeColors[t.type.name] || "#777";
        typesHTML += `<span class="type-badge" style="background:${color}">${t.type.name.toUpperCase()}</span>`;
      });
      document.getElementById("modal-types").innerHTML = `<strong>Types:</strong><br>${typesHTML}`;

      // Evolution (simple chain display)
      let evoHTML = `<strong>Evolution Chain:</strong><br>`;
      if (species.evolution_chain) {
        const chainRes = await fetch(species.evolution_chain.url);
        const chain = await chainRes.json();
        evoHTML += parseEvolutionChain(chain.chain, p.id);
      } else {
        evoHTML += "No evolution";
      }
      document.getElementById("modal-evo").innerHTML = evoHTML;

      modal.style.display = "flex";
    }

    function parseEvolutionChain(chain, currentId) {
      let text = "";
      const name = chain.species.name.charAt(0).toUpperCase() + chain.species.name.slice(1);
      const id = parseInt(chain.species.url.split("/")[6]);

      if (id < currentId) text += `⬅️ Pre: ${name} `;
      else if (id > currentId) text += `➡️ Post: ${name} `;

      if (chain.evolves_to.length > 0) {
        const evoDetails = chain.evolves_to[0].evolution_details[0] || {};
        let method = "???";
        if (evoDetails.min_level) method = `Lv.${evoDetails.min_level}`;
        else if (evoDetails.item) method = evoDetails.item.name;
        else if (evoDetails.trigger) method = evoDetails.trigger.name;
        text += `(${method}) `;
      }
      return text;
    }

    function updateTotalProgress() {
      const count = caught.size;
      document.getElementById("caught-count").textContent = count;
      document.getElementById("total-progress").style.width = `${(count / 1025) * 100}%`;
    }

    function renderGenProgress() {
      const container = document.getElementById("gen-progress");
      container.innerHTML = "";
      genRanges.forEach(g => {
        const genCaught = [...caught].filter(id => id >= g.start && id <= g.end).length;
        const totalInGen = g.end - g.start + 1;
        const percent = Math.round((genCaught / totalInGen) * 100);
        const div = document.createElement("div");
        div.className = "gen-card";
        div.innerHTML = `
          <strong>Gen ${g.gen}</strong> ${genCaught}/${totalInGen} (${percent}%)
          <div class="progress-bar"><div class="progress-bar-fill" style="width:${percent}%"></div></div>
        `;
        container.appendChild(div);
      });
    }

    // Event listeners (same as before + new ones)
    document.getElementById("shiny-btn").addEventListener("click", () => {
      shinyMode = !shinyMode;
      document.getElementById("shiny-btn").textContent = shinyMode ? "✨ Shiny ON" : "✨ Shiny OFF";
      renderGrid();
    });

    document.getElementById("theme-btn").addEventListener("click", () => {
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";
      document.documentElement.setAttribute("data-theme", isDark ? "light" : "dark");
      document.getElementById("theme-btn").textContent = isDark ? "☀️ Light" : "🌙 Dark";
    });

    document.getElementById("sort-select").addEventListener("change", renderGrid);

    document.getElementById("random-btn").addEventListener("click", () => {
      const uncaught = allPokemon.filter(p => !caught.has(p.id));
      if (uncaught.length === 0) return alert("You caught them all! 🔥");
      const random = uncaught[Math.floor(Math.random() * uncaught.length)];
      showDetail(random);
    });

    document.getElementById("close-modal").addEventListener("click", () => {
      document.getElementById("modal").style.display = "none";
    });

    document.getElementById("reset-btn").addEventListener("click", () => {
      if (confirm("Reset entire Living Dex?")) {
        caught.clear();
        localStorage.removeItem("caught");
        renderGrid();
        renderGenProgress();
      }
    });

    // Toggle caught (with extra animation)
    function toggleCaught(id) {
      const card = [...document.querySelectorAll(".pokemon-card")].find(c => c.textContent.includes(`#${id.toString().padStart(4,"0")}`));
      if (caught.has(id)) {
        caught.delete(id);
      } else {
        caught.add(id);
        if (card) card.classList.add("caught");
        // Gen completion check
        const gen = getGen(id);
        const genTotal = genRanges.find(g => g.gen === gen);
        const genCaughtNow = [...caught].filter(i => i >= genTotal.start && i <= genTotal.end).length;
        if (genCaughtNow === genTotal.end - genTotal.start + 1) {
          alert(`🎉 You completed Generation ${gen}!`);
        }
      }
      localStorage.setItem("caught", JSON.stringify([...caught]));
      renderGrid();
      renderGenProgress();
    }

    // Make cards clickable for toggle + detail
    // (detail is now on click, but you can hold shift or something — for now click = detail, we'll add toggle later if you want)
  </script>
</body>
</html>
