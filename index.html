<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Dex • 1025 Pokémon</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading" class="loading">
    <div class="pokeball-container">
      <div class="pokeball" id="pokeball"></div>
    </div>
    <p id="loading-text">Catching them all...</p>
    <button id="skip-loading" class="skip-btn">Skip Loading</button>
  </div>

  <div class="main-layout">
    <!-- Left Sidebar -->
    <aside class="sidebar">
     <div class="floating-box gen-completion">
  <h2>Pokédex Completion</h2>
  
  <!-- TOTAL POKEDEX PROGRESS BAR -->
  <div id="total-completion" class="total-completion">
    <div class="completion-label">
      <span>Total Living Dex</span>
      <span id="total-percentage">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div id="total-bar-fill" class="progress-bar-fill" style="width: 0%"></div>
    </div>
    <div id="caught-count">0 / 1025</div>
  </div>

  <div id="completion-gens" class="completion-gens"></div>
</div>
      <div class="floating-box toggles-box">
        <div class="toggle-row">
          <label class="switch-label">Dark Mode</label>
          <label class="switch">
            <input type="checkbox" id="dark-toggle">
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <label class="switch-label">Shiny Mode</label>
          <label class="switch">
            <input type="checkbox" id="shiny-toggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </aside>

    <!-- Centered Main Content -->
    <div class="content-area">
      <header>
        <h1>Living Dex</h1>
      </header>
      <div class="centered-block">
        <input id="search-bar" type="text" placeholder="Search by name or number...">
        <select id="sort-select">
          <option value="number">Sort by Number</option>
          <option value="name">Sort by Name</option>
          <option value="uncaught">Uncaught First</option>
        </select>
        <button id="random-btn">Random Uncaught</button>
        <button id="reset-btn">Reset Dex</button>
        <main id="grid" class="pokemon-grid"></main>
      </div>
    </div>
  </div>

  <!-- TOOLS HAMBURGER BUTTON – Top Right (always visible) -->
  <button id="tools-btn" class="tools-btn" aria-label="Open Tools">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
  </button>

  <!-- TOOLS MENU – completely hidden until clicked -->
  <div id="tools-menu" class="tools-menu">
    <div class="tools-header">
      <h2>Tools</h2>
      <button id="close-tools" class="close-tools">&times;</button>
    </div>
    <div class="tools-content">
      <p><strong>Filler text for now</strong></p>
      <p>Export Living Dex<br>
         Import Living Dex<br>
         Advanced Filters<br>
         Shiny Stats<br>
         Generation Breakdown<br>
         More tools coming soon...</p>
      <p style="margin-top:40px; font-size:0.9rem; opacity:0.6;">Your Living Dex is saved in your browser.<br>Everything is 100% local!</p>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal" class="close">&times;</span>
      <h2 id="modal-name"></h2>
      <img id="modal-sprite" alt="">
      <div id="modal-types" class="types"></div>
      <div id="modal-evo" class="evo-info"></div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
