<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Dex • 1025 Pokémon</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading" class="loading">
    <div class="pokeball-container">
      <div class="pokeball" id="pokeball"></div>
    </div>
    <p id="loading-text">Catching them all...</p>
    <button id="skip-loading" class="skip-btn">Skip Loading</button>
  </div>

  <div class="main-layout">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="floating-box gen-completion">
        <h2>Pokédex Completion</h2>
        <div id="completion-gens" class="completion-gens"></div>
      </div>

      <div class="floating-box toggles-box">
        <div class="toggle-row">
          <label class="switch-label">Dark Mode</label>
          <label class="switch">
            <input type="checkbox" id="dark-toggle">
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <label class="switch-label">Shiny Mode</label>
          <label class="switch">
            <input type="checkbox" id="shiny-toggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </aside>

    <!-- Centered Main Content -->
    <div class="content-area">
      <header>
        <h1>Living Dex</h1>
      </header>

      <div class="centered-block">
        <!-- ← Search bar is right here -->
        <input id="search-bar" type="text" placeholder="Search by name or number...">
        
        <select id="sort-select">
          <option value="number">Sort by Number</option>
          <option value="name">Sort by Name</option>
          <option value="uncaught">Uncaught First</option>
        </select>
        <button id="random-btn">Random Uncaught</button>
        <button id="reset-btn">Reset Dex</button>

        <div class="total-progress">
          <strong>Total Caught: <span id="caught-count">0</span>/1025</strong>
          <div class="progress-bar"><div id="total-progress-bar" class="progress-bar-fill"></div></div>
        </div>

        <main id="grid" class="pokemon-grid"></main>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal" class="close">&times;</span>
      <h2 id="modal-name"></h2>
      <img id="modal-sprite" alt="">
      <div id="modal-types" class="types"></div>
      <div id="modal-evo" class="evo-info"></div>
      <button id="modal-close-btn">Close</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
