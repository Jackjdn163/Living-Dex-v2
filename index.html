<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Dex • 1025 Pokémon</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading" class="loading">
    <div class="pokeball" id="pokeball"></div>
    <p id="loading-text">Catching them all...</p>
  </div>

  <header>
    <h1>🟥 Living Dex</h1>
    <div class="controls">
      <button id="theme-btn">🌙 Dark</button>
      <button id="shiny-btn">✨ Shiny OFF</button>
      <select id="sort-select">
        <option value="number">Sort by #</option>
        <option value="name">Sort by Name</option>
        <option value="uncaught">Uncaught First</option>
      </select>
      <button id="random-btn">🎲 Random Uncaught</button>
      <button id="reset-btn">Reset Dex</button>
    </div>
  </header>

  <div class="progress-section">
    <strong>Total Caught: <span id="caught-count">0</span>/1025</strong>
    <div class="progress-bar"><div id="total-progress-bar" class="progress-bar-fill"></div></div>
  </div>

  <div id="gen-progress" class="gen-progress"></div>

  <main id="grid" class="pokemon-grid"></main>

  <!-- Modal (extra menu for typing + evo) -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal" class="close">&times;</span>
      <h2 id="modal-name"></h2>
      <img id="modal-sprite" alt="">
      <div id="modal-types" class="types"></div>
      <div id="modal-evo" class="evo-info"></div>
      
      <button id="toggle-caught-btn" class="toggle-btn">Mark as Caught</button>
      <button id="modal-close-btn">Close</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
